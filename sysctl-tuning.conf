# Kernel tuning for maximum Drogon CRUD throughput
# Apply with: sudo sysctl -p sysctl-tuning.conf

# TCP listen backlog - allow more pending connections
net.core.somaxconn = 65535
net.ipv4.tcp_max_syn_backlog = 65535

# TCP Fast Open - reduce handshake latency (client + server)
net.ipv4.tcp_fastopen = 3

# Ephemeral port range - more outbound connections (DB pool, upstream)
net.ipv4.ip_local_port_range = 10000 65535

# TIME_WAIT reuse - reclaim sockets faster under high churn
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_fin_timeout = 30

# File descriptor limit - support massive concurrency
fs.file-max = 2097152

# Network queue and buffer sizes
net.core.netdev_max_backlog = 65535
net.core.rmem_max = 134217728
net.core.wmem_max = 134217728
